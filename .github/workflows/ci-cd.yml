name: CI/CD

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  ci:
    name: Validate Django App
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-not-for-production
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      DJANGO_DB_ENGINE: sqlite
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django checks
        run: python manage.py check

  deploy:
    name: Deploy To Local Server
    needs: ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - windows
      - nhctodo
    env:
      DEPLOY_PATH: D:\apps\nhctodotasks-main
    steps:
      - name: Deploy application
        shell: pwsh
        run: .\scripts\deploy.ps1 -DeployPath "${env:DEPLOY_PATH}"
