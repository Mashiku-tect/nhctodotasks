{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <a href="{% url 'assigned_tasks' %}" class="btn btn-outline-secondary btn-sm mb-3">
        <i class="bi bi-arrow-left"></i> Back
    </a>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-1">
                <div class="card-body">
                    <h2 class="text-center text-primary mb-4">Edit Task</h2>

                    <form id="taskForm" enctype="multipart/form-data" method="POST">
                        {% csrf_token %}
                        <input type="text" name="title" class="form-control mb-2" value="{{ task.title }}" required>
                        <textarea name="description" class="form-control mb-2">{{ task.description }}</textarea>
                        <input type="date" name="due_date" class="form-control mb-2" value="{{ task.due_date|date:'Y-m-d' }}" required>

                        <select name="priority" class="form-select mb-2">
                            {% for value, label in PRIORITY_CHOICES %}
                            <option value="{{ value }}" {% if task.priority == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>

                        <select id="categorySelect" name="category" class="form-select mb-2">
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if task.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>

                        <select id="staffSelect" name="assigned_staff" class="form-select mb-2" multiple>
                            {% for staff in staff_users %}
                            <option value="{{ staff.id }}" {% if staff.id in assigned_staff_ids %}selected{% endif %}>
                                {{ staff.get_full_name|default:staff.email }}
                            </option>
                            {% endfor %}
                        </select>

                        <input type="file" name="attachment" class="form-control mb-2">
                        {% if task.attachment %}
                        <small class="text-muted">Current: {{ task.attachment.name }}</small>
                        {% endif %}

                        <button class="btn btn-primary mt-3" type="submit">Update Task</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
$('#taskForm').on('submit', async function (e) {
    e.preventDefault();
    const btn = $(this).find('button[type="submit"]');
    btn.prop('disabled', true);

    const formData = new FormData(this);

    try {
        const response = await $.ajax({
            url: window.location.href,
            method: "POST",
            data: formData,
            processData: false,
            contentType: false
        });

        Swal.fire({
            icon: 'success',
            title: response.message,
            timer: 1500,
            showConfirmButton: false
        }).then(() => {
            window.location.href = response.redirect_url;
        });

    } catch (err) {
        btn.prop('disabled', false);
        Swal.fire('Error', err.responseJSON?.error || 'Failed', 'error');
    }
});

// Update staff list when category changes
document.getElementById('categorySelect').addEventListener('change', function() {
    const categoryId = this.value;
    fetch(`/tasks/get_staff_by_category/?category_id=${categoryId}`)
        .then(res => res.json())
        .then(data => {
            const staffSelect = document.getElementById('staffSelect');
            staffSelect.innerHTML = '';
            data.staff.forEach(s => {
                const option = document.createElement('option');
                option.value = s.id;
                option.text = s.name;
                staffSelect.appendChild(option);
            });
        });
});
</script>
{% endblock %}
