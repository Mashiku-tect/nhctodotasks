{% extends "base.html" %}

{% block content %}

<div class="container py-4">
    <div class="d-flex align-items-center mb-3">
    <a href="{% url 'assigned_tasks' %}" class="btn btn-outline-secondary btn-sm me-2">
        <i class="bi bi-arrow-left"></i> Back
    </a>
  
</div>
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm border-1">
                <div class="card-body">

                    <h2 class="text-center text-primary mb-4">Edit Task</h2>

                    <form method="post">
                        {% csrf_token %}

                        <!-- Title -->
                        <div class="mb-3">
                            <label class="form-label">Task Title <span class="text-danger">*</span></label>
                            <input type="text" name="title" class="form-control"
                                   value="{{ task.title }}" required>
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label class="form-label">Task Description</label>
                            <textarea name="description" class="form-control" rows="3">{{ task.description }}</textarea>
                        </div>

                        <!-- Attachment -->
                        <div class="mb-3">
                            <label class="form-label">Attach File</label>
                            <input type="file" name="attachment" class="form-control">
                            {% if task.attachment %}
                                <small class="text-muted">
                                    Current: 
                                    <a href="{{ task.attachment.url }}" target="_blank">
                                        {{ task.attachment.name|cut:"task_files/" }}
                                    </a>
                                </small>
                            {% endif %}
                        </div>

                        <!-- Due Date -->
                        <div class="mb-3">
                            <label class="form-label">Task Due Date <span class="text-danger">*</span></label>
                            <input type="date" name="due_date" class="form-control"
                                   value="{{ task.due_date|date:'Y-m-d' }}" required>
                        </div>
            <!-- Priority -->
                            <div class="mb-3">
                            <label class="form-label">Task Priority <span class="text-danger">*</span></label>
                                <select name="priority" class="form-select">
                                    {% for value, label in PRIORITY_CHOICES %}
                                    <option value="{{ value }}" {% if value == 'normal' %}selected{% endif %}>{{ label }}</option>
                                    {% endfor %}
                                </select>
                </div>

                        {% if user.role == 'manager' %}
                        <!-- Assign -->
                        <div class="mb-3">
                            <label class="form-label">Assign to Staff</label>
                            <select name="assigned_to" class="form-select" multiple>
                                {% for staff in subordinates %}
                                    <option value="{{ staff.id }}"
                                        {% if staff in current_assignees %}selected{% endif %}>
                                        {{ staff.get_full_name|default:staff.email }}
                                    </option>
                                {% endfor %}
                            </select>
                            <small class="text-muted">Hold Ctrl/Cmd to select multiple</small>
                        </div>
                        {% endif %}

                        <!-- Buttons -->
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'task_detail' task.id %}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                Save Changes
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
