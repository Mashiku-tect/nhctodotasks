{% extends 'base.html' %}

{% block content %}
<h2>Edit Subtask</h2>

<form method="post" class="card shadow-sm border-0 p-4">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Title</label>
        <input
            type="text"
            name="title"
            class="form-control"
            value="{{ subtask.title }}"
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea
            name="description"
            class="form-control"
            rows="4"
        >{{ subtask.description }}</textarea>
    </div>

    <div class="d-flex gap-2">
        <a href="{% url 'task_detail' subtask.task.id %}" class="btn btn-secondary">
            Cancel
        </a>
        <button class="btn btn-primary">
            Save Changes
        </button>
    </div>
</form>
{% endblock %}
