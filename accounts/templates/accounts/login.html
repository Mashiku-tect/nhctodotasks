<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHC - Login</title>

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --nhc-primary: #000000;       /* black */
    --nhc-accent: #fbbf24;        /* orange */
    --nhc-accent-dark: #f59e0b;   /* darker orange */
    --nhc-light: #ffffff;         /* white */
    --nhc-dark: #000000;          /* black text */
    --nhc-warning: #dc2626;       /* red for errors */
}

body {
    background: var(--nhc-light);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: var(--nhc-dark);
    min-height: 100vh;
    margin: 0;
}

/* Login card */
.login-card {
    border-radius: 15px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    overflow: hidden;
    display: flex;
    flex-wrap: wrap;
    max-width: 900px;
    margin: auto;
}

/* Left panel */
.login-left {
    flex: 1 1 50%;
    background: var(--nhc-primary);
    color: var(--nhc-light);
    padding: 3rem 2rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.login-left h2 {
    margin-bottom: 1rem;
    font-weight: 700;
}

.login-left p, .login-left ul li { opacity: 0.9; color: var(--nhc-light); }
.login-left ul { list-style: none; padding-left: 0; }
.login-left ul li { margin-bottom: 0.5rem; }
.login-left ul li i { margin-right: 0.5rem; color: var(--nhc-accent); }

/* Right panel */
.login-right {
    flex: 1 1 50%;
    background: var(--nhc-light);
    padding: 3rem 2rem;
}

.login-right h3 { text-align: center; margin-bottom: 2rem; color: var(--nhc-dark); }

.form-control { border-radius: 8px; border: 1px solid #cbd5e1; padding: 0.75rem 1rem; font-size: 1rem; }

.btn-nhc {
    background: var(--nhc-accent);
    border: none;
    color: var(--nhc-dark);
    font-weight: 600;
    padding: 0.875rem;
    border-radius: 8px;
    transition: all 0.3s ease;
    font-size: 1rem;
    letter-spacing: 0.5px;
}

.btn-nhc:hover {
    background: var(--nhc-accent-dark);
    transform: translateY(-2px);
    box-shadow: 0 7px 20px rgba(245, 158, 11, 0.25);
    color: var(--nhc-dark);
}

.password-toggle {
    cursor: pointer;
    background-color: #f1f5f9;
    border: 1px solid #cbd5e1;
    color: #64748b;
    padding: 0.75rem 1rem;
    transition: all 0.2s ease;
}

.password-toggle:hover {
    background-color: var(--nhc-accent);
    color: var(--nhc-dark);
    border-color: var(--nhc-accent);
}

/* Toast notification */
#loginToast {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 1055;
    min-width: 250px;
}
.toast-header { font-weight: 600; }
.toast-body { color: var(--nhc-warning); }

/* Responsive */
@media (max-width: 768px) {
    .login-left { display: none; }
    .login-right { flex: 1 1 100%; }
}
</style>
</head>
<body>

<div class="d-flex align-items-center justify-content-center min-vh-100 p-3">
    <div class="login-card">

        <!-- Left description -->
        <div class="login-left">
            <div class="nhc-logo mb-3">
                <span style="color:#fbbf24;">N</span>
                <span style="color:#ffffff;">H</span>
                <span style="color:#fbbf24;">C</span>
            </div>
            <h2>
                <span style="color:#fbbf24;">National</span>
                <span style="color:#ffffff;">Housing</span>
                <span style="color:#fbbf24;">Corporation</span>
            </h2>
            <p>{% block header_subtitle %}To do task system{% endblock %}</p>
        </div>

        <!-- Right login form -->
        <div class="login-right">
            <h3>Sign In</h3>

            <form method="POST" action="{% url 'login' %}" autocomplete="off">
                {% csrf_token %}

                <!-- Email -->
                <div class="mb-3">
                    <label for="id_email" class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                        <input type="email" class="form-control" id="id_email" name="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label for="id_password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" class="form-control" id="id_password" name="password" placeholder="••••••••" required>
                        <button type="button" class="password-toggle input-group-text"><i class="fas fa-eye"></i></button>
                    </div>
                </div>

                <!-- Submit -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-nhc">Sign In</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Toast HTML -->
<div class="toast align-items-center text-bg-light border-0" id="loginToast" role="alert" aria-live="assertive" aria-atomic="true">
  <div class="d-flex">
    <div class="toast-body">
        <i class="fas fa-exclamation-triangle me-1"></i> Invalid email or password
    </div>
    <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
  </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Password toggle
document.querySelectorAll('.password-toggle').forEach(button => {
    button.addEventListener('click', function() {
        const input = this.previousElementSibling;
        const icon = this.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    });
});

// Show toast if login fails
{% if form.errors %}
document.addEventListener('DOMContentLoaded', function() {
    var toastEl = document.getElementById('loginToast');
    var bsToast = new bootstrap.Toast(toastEl, { delay: 4000 });
    bsToast.show();
});
{% endif %}
</script>

</body>
</html>
